name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: ci-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  deploy:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, prod-host]
    timeout-minutes: 30
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy (docker compose up -d --build --wait)
        run: docker compose up -d --build --wait

      - name: Smoke test (health via Caddy gateway)
        run: >
          curl -fsS --retry 5 --retry-delay 3
          -H 'Host: pdf.home.gustavorh.com'
          http://10.0.30.254:8080/api/health

      - name: Prune dangling images
        run: docker image prune -f
